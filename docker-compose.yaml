services:
  specforge-api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: specforge-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - INFERENCE_PROVIDER=${INFERENCE_PROVIDER:-remote}
      - INFERENCE_API_ENDPOINT=${INFERENCE_API_ENDPOINT}
      - INFERENCE_API_TOKEN=${INFERENCE_API_TOKEN}
      - INFERENCE_MODEL_NAME=${INFERENCE_MODEL_NAME}
      - LLM_TEMPERATURE=${LLM_TEMPERATURE:-0.7}
      - LLM_MAX_TOKENS=${LLM_MAX_TOKENS:-8000}
      - CORS_ALLOW_ORIGINS=${CORS_ALLOW_ORIGINS}
    networks:
      - specforge-network
    extra_hosts:
      - "${LOCAL_URL_ENDPOINT:-not-needed}:host-gateway"
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  specforge-ui:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: specforge-ui
    ports:
      - "3000:3000"
    environment:
      - VITE_API_BASE_URL=http://localhost:8000
    depends_on:
      - specforge-api
    networks:
      - specforge-network
    restart: unless-stopped

networks:
  specforge-network:
    driver: bridge
